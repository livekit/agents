name: Deploy Examples

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to deploy from (default: main)"
        type: string
        required: false
        default: "main"
  workflow_call:
    inputs:
      ref:
        type: string
        required: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [healthcare, survey, frontdesk, drive-thru]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Install LiveKit CLI
        run: |
          curl -sSL https://get.livekit.io/cli | bash
          lk --version

      - name: Add LiveKit Cloud project
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_EXAMPLES_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_EXAMPLES_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_EXAMPLES_API_SECRET }}
        run: |
          lk project add examples \
            --url "$LIVEKIT_URL" \
            --api-key "$LIVEKIT_API_KEY" \
            --api-secret "$LIVEKIT_API_SECRET" \
            --default

      - name: Regenerate livekit.toml from playground.yaml
        run: |
          python3 -m pip install --quiet pyyaml
          python3 <<'PY'
          import yaml
          from pathlib import Path
          data = yaml.safe_load(Path("examples/playground.yaml").read_text())
          subdomain = data["project"]["subdomain"]
          slug = "${{ matrix.example }}"
          entry = data["examples"][slug]
          toml = (
              "[project]\n"
              f'  subdomain = "{subdomain}"\n'
              "\n"
              "[agent]\n"
              f'  id = "{entry["agent_id"]}"\n'
          )
          Path(f"examples/{slug}/livekit.toml").write_text(toml)
          print(f"wrote examples/{slug}/livekit.toml")
          PY

      - name: Build secrets file
        working-directory: examples/${{ matrix.example }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          : > .env.deploy
          # Register the agent under a deterministic name so the playground
          # can dispatch to it explicitly. Matches the slug in playground.yaml.
          echo "LIVEKIT_AGENT_NAME=${{ matrix.example }}" >> .env.deploy
          case "${{ matrix.example }}" in
            healthcare)
              keys="OPENAI_API_KEY"
              ;;
            *)
              keys=""
              ;;
          esac
          for k in $keys; do
            val="${!k}"
            if [ -n "$val" ]; then
              echo "${k}=${val}" >> .env.deploy
            fi
          done

      - name: Deploy ${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        run: |
          args=()
          if [ -s .env.deploy ]; then
            args+=(--secrets-file .env.deploy)
          fi
          lk agent deploy "${args[@]}" .

  publish-manifest:
    name: Publish examples manifest to agents-jukebox
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Checkout agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || 'main' }}
          path: agents

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --quiet pyyaml

      - name: Build manifest
        run: |
          python <<'PY' > examples-manifest.json
          import json, yaml
          from pathlib import Path

          # Which file types we ship for the in-app code explorer. Skip
          # binaries (.pdf, .mp3, etc.) and lockfiles.
          TEXT_EXTS = {
              ".py": "python",
              ".toml": "toml",
              ".md": "markdown",
              ".txt": "text",
              ".yaml": "yaml",
              ".yml": "yaml",
              ".json": "json",
              ".sh": "bash",
              ".env": "env",
          }
          SPECIAL = {
              "Dockerfile": "dockerfile",
              "Makefile": "makefile",
              "requirements.txt": "text",
          }
          SKIP = {".dockerignore", ".gitignore", ".DS_Store"}
          MAX_BYTES = 200_000  # cap any single file to keep the manifest sane

          def detect_lang(name: str) -> str | None:
              if name in SPECIAL:
                  return SPECIAL[name]
              for ext, lang in TEXT_EXTS.items():
                  if name.endswith(ext):
                      return lang
              return None

          def collect_files(dir_path: Path) -> list[dict]:
              out = []
              for p in sorted(dir_path.rglob("*")):
                  if not p.is_file():
                      continue
                  rel = p.relative_to(dir_path).as_posix()
                  if any(part in SKIP for part in p.parts):
                      continue
                  lang = detect_lang(p.name)
                  if not lang:
                      continue
                  try:
                      content = p.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue
                  if len(content.encode("utf-8")) > MAX_BYTES:
                      content = content[:MAX_BYTES] + "\n\n# [file truncated]\n"
                  out.append({"path": rel, "language": lang, "content": content})
              return out

          import re
          GH_LINK = re.compile(
              r"https://github\.com/livekit/agents/blob/[^/\s]+/examples/"
              r"(?P<slug>[\w-]+)/(?P<path>[\w./-]+)"
              r"#L(?P<start>\d+)(?:-L(?P<end>\d+))?"
          )

          def inline_links(content: str, slug: str, files: list[dict]) -> str:
              # Map path -> content for cheap lookup
              by_path = {f["path"]: f for f in files}
              out = []
              for line in content.split("\n"):
                  m = GH_LINK.fullmatch(line.strip())
                  if not m or m.group("slug") != slug:
                      out.append(line)
                      continue
                  fp = m.group("path")
                  src = by_path.get(fp)
                  if not src:
                      out.append(line)
                      continue
                  start = int(m.group("start"))
                  end = int(m.group("end") or start)
                  src_lines = src["content"].split("\n")
                  # Clamp + extract; GitHub line numbers are 1-indexed.
                  s = max(1, start) - 1
                  ePos = min(len(src_lines), end)
                  snippet = "\n".join(src_lines[s:ePos])
                  fence_lang = src["language"] if src["language"] != "text" else ""
                  # Snippet replaces the URL outright — the code is here,
                  # the attribution line was just noise.
                  out.append("```" + fence_lang)
                  out.append(snippet)
                  out.append("```")
              return "\n".join(out)

          root = Path("agents/examples")
          m = yaml.safe_load((root / "playground.yaml").read_text())
          for slug, e in m.get("examples", {}).items():
              files = collect_files(root / slug)
              # Inline GitHub permalink references in every .md file so the
              # in-app viewer shows the actual snippet instead of a bare URL.
              for f in files:
                  if f["language"] == "markdown":
                      f["content"] = inline_links(f["content"], slug, files)
              e["files"] = files
          print(json.dumps(m, indent=2, ensure_ascii=False))
          PY

      - name: Checkout agents-jukebox
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: livekit/agents-jukebox
          ssh-key: ${{ secrets.JUKEBOX_DEPLOY_KEY }}
          path: jukebox

      - name: Commit and push if changed
        working-directory: jukebox
        run: |
          mkdir -p next/public
          cp ../examples-manifest.json next/public/examples-manifest.json
          git config user.name "livekit-examples-bot"
          git config user.email "examples-bot@livekit.io"
          git add next/public/examples-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged, nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh examples manifest"
          for i in 1 2; do
            if git push origin HEAD; then
              echo "Pushed manifest update."
              exit 0
            fi
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase origin HEAD
          done
          echo "Failed to push manifest after retries." >&2
          exit 1
