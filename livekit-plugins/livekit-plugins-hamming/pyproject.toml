[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "livekit-plugins-hamming"
dynamic = ["version"]
description = "Monitoring plugin for exporting LiveKit AgentSession call review payloads to Hamming"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10.0"
authors = [{ name = "Hamming", email = "engineering@hamming.ai" }]
keywords = ["voice", "ai", "realtime", "audio", "video", "livekit", "hamming", "monitoring"]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Multimedia :: Video",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3 :: Only",
]
dependencies = ["livekit-agents>=1.5.6", "aiohttp>=3.9"]

[project.urls]
Documentation = "https://docs.hamming.ai"
Website = "https://hamming.ai/"
Source = "https://github.com/livekit/agents"

[tool.hatch.version]
path = "livekit/plugins/hamming/version.py"

[tool.hatch.build.targets.wheel]
packages = ["livekit"]

[tool.hatch.build.targets.sdist]
include = ["/livekit"]

[tool.uv]
exclude-newer = "7 days"
exclude-newer-package = { livekit-agents = "0 days" }
