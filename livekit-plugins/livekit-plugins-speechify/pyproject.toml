[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "livekit-plugins-speechify"
dynamic = ["version"]
description = "Agent Framework plugin for voice synthesis with Speechify's API."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10.0"
authors = [{ name = "Speechify", email = "hello@speechify.ai" }]
keywords = ["webrtc", "realtime", "audio", "video", "livekit", "speechify", "tts"]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Multimedia :: Video",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3 :: Only",
]
dependencies = ["livekit-agents[codecs]>=1.6.6", "speechify-api>=3.0.1"]

[project.urls]
Documentation = "https://docs.speechify.ai"
Website = "https://speechify.ai"
Repository = "https://github.com/Speechify-AI/livekit-plugin-python"
Issues = "https://github.com/Speechify-AI/livekit-plugin-python/issues"

[tool.hatch.version]
path = "livekit/plugins/speechify/version.py"

[tool.hatch.build.targets.wheel]
packages = ["livekit"]

[tool.hatch.build.targets.sdist]
include = ["/livekit"]

[tool.uv]
exclude-newer = "7 days"
exclude-newer-package = { livekit-agents = "0 days" }
