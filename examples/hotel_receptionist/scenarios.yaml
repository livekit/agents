    has to leave before finishing and asks to be called back to complete the booking. A good
    receptionist does not try to force the booking to completion on this call and does not
    simply promise a callback verbally. It actually records the follow-up so the lead is not
    lost (rather than a verbal "we'll call you back" with nothing behind it - that is the
    named failure mode), then reassures the caller in honest terms (it's logged for follow-
    up, not "someone is calling you right now"). The agent should read back or confirm the
    name and number it captured.
