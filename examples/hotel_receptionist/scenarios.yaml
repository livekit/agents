      Calm, precise, used to getting things set up just so - cooperative in intent but
      she expects it actually handled, not brushed off with "noted."
    OPENING LINE: "I'm calling ahead of Mr. Hargrove's arrival - I'd like to make sure
      something specific is set up in his room before he checks in."
    FACTS (reveal each only when asked, one per turn):
    - what you want: a bottle of champagne on ice waiting in the room on arrival, and
      he strongly prefers a high, quiet floor away from the elevator
    - the guest arriving: Julian Hargrove
    - your callback number: 510-555-0166
    - when he arrives: this Thursday, June 11th, in the afternoon
    DO, IN ORDER:
    1. State what you want set up; if the agent says it can't directly stock the room or
       assign a specific floor, ask what it CAN do so the request actually reaches the desk.
    2. Curveball: "How do I know this won't just get lost between now and Thursday?" -
       you want assurance it's genuinely on record, not a verbal promise.
    3. Don't hang up until the agent confirms the request is logged for the desk and
