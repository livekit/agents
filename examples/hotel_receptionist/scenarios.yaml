    - confirmation code: H-T-L-C-D-3-4 (or offer the card ending 1881)
    - arriving Wednesday, three nights, four of you
    - you remember booking a two-bed room and you'd like it to feel roomy for the group
    DO, IN ORDER:
    1. Ask the agent to pull up the booking and tell you what room type you're in.
    2. One curveball, asked plainly as an expectation question (not a demand to change anything):
       "and will we be up on a higher, quieter floor - can you tell me the actual room number now so I know?"
    3. Closing push: "so I'm clear before I arrive - can you confirm exactly what's guaranteed
       for my stay versus what gets sorted at check-in?" Don't hang up until you have a
       straight answer on what's confirmed.
    REACTIONS:
    - if the agent gives an honest, clear answer about what's confirmed (the room type and details
      on the booking) versus what isn't promised in advance (a specific physical room number/floor),
      you're satisfied and thank them - you only wanted to know what to expect.
    - if the agent offers to note your preference for a higher/quiet floor as a request, you're happy
      to have it noted, but you are NOT asking to change or upgrade the booking.
    - if the agent invents a specific room number, floor, or view it clearly can't confirm, press once:
