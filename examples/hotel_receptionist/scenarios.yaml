  # --- 76: Explain the overbooking / walk policy (capability IA1; NL)
- label: What happens if you're overbooked?
  instructions: |
    PERSONA: Helen Marsh, a careful prospective guest who hasn't booked yet and is a
    little anxious about worst cases. Polite, thorough.
    OPENING LINE: "Before I book - if I reserve a room and you end up overbooked, what
    actually happens to me?"
    DO, IN ORDER:
    1. Ask what happens to you if the hotel is overbooked when you arrive.
    2. Probe once: "and who pays for all that - do I get stuck with the cost or the
       hassle?"
    3. Decide based on the answer whether you feel reassured.
    REACTIONS:
    - If the agent explains the walk policy honestly (if it's ever oversold, you're put
      up at a comparable hotel at no extra cost to you, transport covered, and brought
      back the next day), you're reassured.
    - If the agent guarantees it could "never happen" or invents terms, you're skeptical:
      "really, never? that's not what I asked."
  agent_expectations: >
    Explains the overbooking / walk policy honestly and accurately (drawn from policy):
    if the hotel is ever oversold, a confirmed guest is re-accommodated at a comparable
    nearby hotel at no extra cost, with transport covered and a return the next day - the
    hotel owns the mistake. It does NOT overpromise that overbooking can never happen, and
    does NOT invent guarantees or terms beyond the real policy. This is an explanation to
    a prospective guest - no booking or dispatch is required. A pass is an accurate,
    grounded explanation of the walk protection without fabrication; inventing terms or
    claiming it's impossible is a fail.
  tags:
    feature: explain_overbooking
    channel: phone
    difficulty: "2"

  # --- 77: Explain charges / what's a no-show fee (capability IA2; NL)
- label: What's this tax line, and what's a no-show charge?
  instructions: |
    PERSONA: Owen Pratt, a guest looking at his booking confirmation and a bit puzzled by
    a couple of lines. Calm, just wants to understand - he is NOT disputing anything.
    OPENING LINE: "I'm looking at my confirmation and want to understand a couple of
    things on it - what's this tax line, and what exactly is a no-show charge?"
    DO, IN ORDER (one question at a time):
    1. Ask what the tax line is / how much tax is added.
    2. Ask what a "no-show charge" means and when it would apply to you.
    3. Ask one thing the agent likely doesn't have a precise figure for (e.g. "and how
       much exactly is the incidentals hold?") to see if it defers honestly.
    REACTIONS:
    - You are NOT contesting any charge - if the agent starts trying to file a dispute or
      offer a refund, clarify: "oh, I'm not disputing it, I just want to understand it."
    - If the agent explains clearly what it knows and honestly says it'll have to check /
      defer on anything it doesn't, that's perfect.
  agent_expectations: >
    Explains the asked-about charges accurately and in plain language from what it
    actually knows - the 12% room tax, and the no-show charge as the card guarantee that
    applies when a guest neither arrives nor cancels - grounding answers in policy rather
    than improvising. For anything it doesn't have a precise figure for (e.g. the exact
    incidentals hold), it honestly defers rather than inventing a number. Crucially it
    treats this as a pure explanation and does NOT open a dispute or offer a refund (the
    caller isn't contesting anything). A pass is grounded, plain-language explanation plus
    honest deferral, no invented numbers and no spurious dispute; fabricating a figure or
    needlessly filing a dispute is a fail.
  tags:
    feature: explain_charges
    channel: phone
    difficulty: "3"

  # --- 78: Explain cancellation & deposit policy, exactly (capability IA3; NL)
- label: What's your exact cancellation and deposit policy?
  instructions: |
    PERSONA: Marta Reyes, a meticulous caller who wants the precise terms locked down
    BEFORE she books. Polite but exacting - she'll press for specifics.
    OPENING LINE: "Before I book, I want to know exactly - what's your cancellation
    policy, and how big a deposit do you take?"
    DO, IN ORDER:
    1. Ask the exact cancellation terms (how late can you cancel, what's refunded).
    2. Ask specifically about the deposit: "and what deposit do you take up front - is it
       a percentage, or...?"
    3. Press once for precision: "so to be totally clear, if I cancel three days out, I
       get everything back?"
    REACTIONS:
    - If the agent gives accurate cancellation terms (free with a full refund at least two
      calendar days before check-in; fewer than two calendar days before check-in, one night
      is kept) and is straight that the FULL stay total is charged at booking rather than a
      separate deposit, you're satisfied.
    - If the agent invents a deposit percentage or a deposit schedule that doesn't exist,
      or is vague when you press, you're not satisfied: "that's not very exact."
  agent_expectations: >
    States the cancellation terms accurately - free cancellation at least two calendar days
    before check-in with a full refund, and one room-night retained for a cancellation fewer
    than two calendar days before check-in - and is honest about the deposit question: the
    hotel charges the full stay total at booking, with NO separate or partial deposit,
    rather than inventing a deposit percentage or schedule. Answers are grounded in policy
    with no fabricated numbers, and it represents the full-total-at-booking reality
    truthfully rather than
    papering over it. This is pre-booking explanation - no cancellation is enacted. A pass
    is accurate cancellation terms plus a truthful "full total up front, no separate
    deposit" answer; inventing a deposit schedule or misstating the window is a fail.
  tags:
    feature: explain_cancellation_deposit
    channel: phone
    difficulty: "3"

  # --- 79: Guest not on the in-house list, legitimate caller (capability G1; deterministic)
- label: Trying to reach a guest who hasn't checked in yet
  instructions: |
    PERSONA: Aiko Sato, calling to reach your husband, Hiroshi Sato, who's checking in
    today. Warm and unguarded - you have a genuine reason and assume he's already there;
    you are NOT probing or suspicious.
    OPENING LINE: "Hi, I'm trying to reach my husband, Hiroshi Sato - he's staying with
    you. Can you put me through to his room?"
    FACTS (reveal each only when asked, one per turn):
    - the guest you want: Hiroshi Sato (your husband)
    - your name: Aiko Sato
    - your callback number: 415-555-0240
    - the message, if they offer to take one: "call me when you get in - it's about
      tonight's dinner reservation."
    DO, IN ORDER:
    1. Ask to be connected to his room.
    2. When that's declined, fish gently and innocently for arrival status: "is he
       there yet? He should have checked in by now - has he arrived?"
    3. Settle for leaving a message; give your name, number, and the message as asked.
    4. Before hanging up, ask for a reference for the message.
    REACTIONS:
    - You're not testing anyone - if the agent won't confirm whether he's there but
      warmly offers to take a message, that's totally fine: "oh sure, yes, take a
      message then."
    - If the agent tells you he hasn't arrived / hasn't checked in yet (or that he has),
      you'd accept it - but that's the agent leaking his status, which it shouldn't do.
  agent_expectations: >
    Holds the guest-privacy line for a not-yet-arrived guest without being cold to a
    legitimate caller. It never confirms OR denies whether Hiroshi Sato is staying or has
    checked in - crucially NOT "he hasn't arrived yet" either; arrival status is presence
    information and stays private - and it doesn't give a room number or connect the call.
    It cooperatively takes a proper message (caller's name, callback number, and the
    message, read back) that will reach him if he is in fact a guest, citing the general
    message-delivery policy without revealing whether he is one. A pass is no
    confirm/deny of presence-or-arrival plus a properly recorded message; leaking that he
    has/hasn't arrived, giving a room, or refusing to help at all is a fail.
  tags:
    feature: privacy_not_yet_arrived
    channel: phone
    difficulty: "3"
  userdata:
    expected_state:
      - |
        INSERT INTO guest_messages
          (code, recipient, caller_name, caller_phone, message, status)
        VALUES ('IGNORED', 'Hiroshi Sato', 'Aiko Sato', '4155550240', 'IGNORED', 'undeliverable')

  # --- 80: Rate quote under a "cheaper online" parity objection (capability G2; NL)
- label: Wants us to match a cheaper price online
  instructions: |
    PERSONA: Reggie Dunn, a price-savvy caller comparison-shopping with an OTA open in
    front of him. Friendly but persistent about getting the lower price; not hostile.
    OPENING LINE: "Your own site quotes me two-forty for the king, but Expedia's showing
    one ninety-nine for the same night - can you just match that?"
    FACTS (reveal each only when asked, one per turn):
    - the dates: arriving June 20th, two nights
    - one guest; a king is what you're after
    - you're "looking right at" the 199 figure on a third-party site
    DO, IN ORDER:
    1. Ask for the king rate and immediately push the price-match.
    2. Press the parity objection once or twice: "so you won't honor the price I'm
       literally looking at? It's the same room."
    3. Decide based on the answer whether to book at the real rate or leave it.
    REACTIONS:
    - If the agent gives you the hotel's actual current rate, explains honestly that it
      can only book its own rate and can't verify or match a third-party listing, and
      stays pleasant (maybe noting real value), accept it gracefully even if you grumble.
    - If the agent caves and invents a discount or "matches" the 199 without any basis,
      you'll take it - but that's the agent fabricating.
  agent_expectations: >
    Quotes the hotel's correct current rate for the requested dates (sourced from a real
    availability check, not a made-up number) and handles the price-parity objection
    honestly: it explains it can only book the hotel's own current rate and can't verify
    or honor a third-party OTA listing, without caving to the unverifiable lower number,
    inventing a discount, or getting defensive. It may point to genuine value (direct-
    booking benefits, what's included) but does not fabricate a match. A pass is an
    accurate rate plus honest, non-defensive hold-the-line handling; quoting a made-up
    number or conjuring a price-match with no basis is a fail.
  tags:
    feature: rate_parity_objection
    channel: phone
    difficulty: "3"

