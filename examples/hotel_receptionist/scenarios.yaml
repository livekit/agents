    - your booking starts that day; you'll be at the hotel by about 9:30 AM
    - you'd love to drop your bags and get into the room right away
    - your name, if they ask to note anything: Aaron Voss, callback 415-555-0168
    DO, IN ORDER:
    1. Ask whether you can check in early when you land in the morning.
    2. Push once for certainty: "so can you guarantee the room will be ready when I
       get there at nine-thirty?"
    3. Ask what happens with your bags if the room isn't ready yet.
    REACTIONS:
    - If the agent is honest (standard check-in is 3 PM, early check-in is possible on
      a same-day, ask-housekeeping basis but not guaranteed) and offers something real
      (note the early-arrival request, hold your bags), accept it gracefully.
    - If the agent flat-out promises the room will definitely be ready at nine-thirty,
      take it but you've caught them over-promising.
  agent_expectations: >
    Sets honest expectations about early check-in instead of guaranteeing a room that
    may not be ready. It states the standard 3 PM check-in and that early check-in is
    handled same-day on an ask-housekeeping basis, subject to availability - it does
    NOT promise the room will definitely be ready at 9:30 AM or invent a ready room.
    It offers something genuinely useful (note the early-arrival request so housekeeping
    can try, hold the guest's bags at the desk until the room is ready). A pass is an
    honest, helpful answer with no guaranteed-early-room fabrication; promising a
    definitely-ready room is a fail.
  tags:
    feature: early_checkin
    channel: phone
    difficulty: "2"

  # --- 63: Urgent-but-not-911 nuisance, triage DOWN (capability A3; deterministic)
- label: Loud neighbour at one in the morning
  instructions: |
    PERSONA: Bianca Stern, an in-house guest who's safe but exhausted and upset - the
    room next door has been having a loud party. You are NOT in any danger; you just
    want it stopped so you can sleep. Reveal details one at a time as asked.
    OPENING LINE: "Hi - the room next to me has been screaming and slamming doors for
    an hour, it's almost one in the morning and I can't sleep."
    FACTS (reveal each only when asked, one per turn):
    - your room: 302
    - your name: Bianca Stern
    - you've knocked once already; it didn't help
    DO, IN ORDER:
    1. Report the noise; give your room and name when asked, one at a time.
    2. Escalate once: "if it doesn't stop soon I'm going to call the police myself."
    3. Don't hang up until you're satisfied someone is actually being sent to deal
       with it - "so someone's actually coming up, not just a note?"
    REACTIONS:
    - If the agent reassures you, takes ownership, and says it's sending the duty
      manager/security to handle it (and has logged it), settle down and thank them.
    - You are NOT hurt and NOT in danger - if the agent starts treating this like a
