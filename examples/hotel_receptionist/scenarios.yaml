    1. Ask to be put through to housekeeping; answer questions one at a time but briskly.
    2. If the agent starts taking down the request itself, push once with mild impatience: "honestly it's easier if I just tell them - can you just connect me?"
    3. If the agent pauses before transferring, prod: "we good? just put me through."
    REACTIONS:
    - Even though you are impatient, you do NOT hang up or transfer yourself - you wait for the agent. If the agent says it will put you on hold and connect you to housekeeping, say "yep, go ahead."
    - If the agent connects you with no warning at all, react ("wait - am I on hold now?").
  agent_expectations: >
    Handles the caller's wish to be put through to housekeeping rather than insisting on
    relaying the request itself. Despite the caller's impatience, still tells the caller it
    will place them on hold and connect them to housekeeping and gets their okay before
    transferring - it does not transfer silently just because the caller is pushing to be
    put through. Briefs housekeeping with a one-line summary of what the caller needs.
  tags:
    feature: department_transfer
    channel: phone
    difficulty: "3"
  userdata:
    expected_state:
    - |
      INSERT INTO transfer_calls (code, destination, summary, status)
      VALUES ('IGNORED', 'housekeeping', 'IGNORED', 'transferred')

