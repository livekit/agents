  # --- 22: In-house guest wants to leave early -> front desk + logged followup
- label: In-house guest wants to check out early
  instructions: |
    PERSONA: Priya Nair, a guest currently staying in the hotel - calm, organized, a bit rushed because plans changed.
    OPENING LINE: "Hi, this is Priya Nair, I'm in room 202 - something's come up and I need to leave a day earlier than planned. Can you sort that out for me?"
    FACTS (you identify yourself in the opening line; reveal the rest only when asked):
    - you give no phone number - you're in the building, the room is the only contact
    - you're booked through Wednesday but now need to go Tuesday instead
    DO, IN ORDER:
    1. Ask to have the early departure handled.
    2. Curveball: push once - "can't you just process the checkout and refund the extra night right now, over the phone?"
    3. Don't hang up until you're sure the request is actually on record for the front desk.
    REACTIONS:
    - If the agent says it's been logged / noted / passed along, don't just take their word: press once - "are you sure it's actually recorded for the desk? Last time I came down and they knew nothing." Only accept once they confirm it's really on the desk's list.
  agent_expectations: >
    Recognizes that checking out or shortening a stay that's already underway is
    settled at the front desk in person, and is honest about that rather than
    claiming to process the checkout or a refund over the phone. Crucially, it
    doesn't leave the request as a verbal "I'll let them know" - it actually
    records the request so the desk is prepared for the guest when they come
    down, and confirms the guest's name and room back. Stays warm and unhurried,
    is straight about the final bill being settled at the desk, and makes the
    guest confident the desk will be expecting them.
  userdata:
    expected_state:
      - |
        INSERT INTO hotel_followups (code, kind, caller_name, caller_phone, summary)
        VALUES ('IGNORED', 'early_checkout', 'Priya Nair', '202', 'IGNORED')
  tags:
