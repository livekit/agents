  # --- 27: Calling ahead to confirm room/floor -> status-aware honesty (NL-only)
- label: Calling ahead to confirm which room and floor
  instructions: |
    PERSONA: Marcus Johnson, an upcoming guest calling a few days before arrival to
      picture his stay. Friendly, organized, a planner - asks one thing at a time.
    OPENING LINE: "Hi - I've got a reservation coming up and I just want to confirm what room I'll be in."
