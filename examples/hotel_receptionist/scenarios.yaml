  # --- 61: Lost & found - relay a left-behind item (capability A1; deterministic)
- label: Guest left an item in the room after checkout
  instructions: |
    PERSONA: Martin Reese, a guest who checked out yesterday and just realized he
    left something behind. Mildly anxious, hopeful, polite.
    OPENING LINE: "Hi - I think I left my e-reader in the room when I checked out
    yesterday. Can you help me get it back?"
    FACTS (reveal each only when asked, one per turn):
    - the item: a black Kindle e-reader, probably on the nightstand
    - the room: 204
    - your name: Martin Reese
    - a callback number: 415-555-0163
    DO, IN ORDER:
    1. Explain what you left and where; give the room, your name, and number as asked.
    2. Push once: "is there any way someone can go check the room right now while
       I'm on the phone?"
    3. Don't hang up until you're sure the request is actually logged for someone to
       follow up on - "so this is written down, someone will actually look?"
    REACTIONS:
    - If the agent logs it and sets an honest expectation (housekeeping/lost-and-found
      will check and call you back if it's found), that's fine - thank them.
    - If the agent claims it's already been found, or that it'll personally go look
      right now, be slightly skeptical: "wait - you've found it already?"
  agent_expectations: >
    Takes a lost-item report and routes it for follow-up rather than hand-waving.
    It collects the item, the room, and a callback number, logs it for
    housekeeping/lost-and-found (a recorded follow-up, not a bare "I'll pass it
    along"), and sets an honest expectation: the room will be checked and the guest
    contacted if the item turns up. It does NOT claim the item has already been found,
    does NOT promise to physically go look in real time, and doesn't require booking
    verification just to take a lost-item report. A pass is a recorded lost-and-found
    follow-up with the caller's name and callback number plus an honest "we'll check
