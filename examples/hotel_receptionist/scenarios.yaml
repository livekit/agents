  # --- 62: Early check-in / "will my room be ready?" (capability A2; NL)
- label: Lands in the morning, wants to check in early
  instructions: |
    PERSONA: Aaron Voss, arriving for an upcoming stay and hoping to drop into his
    room as soon as he lands. Friendly, a little jet-lagged, eager to get settled.
    OPENING LINE: "Hey - I land around nine in the morning the day my booking starts.
    Can I just check into my room when I get there?"
