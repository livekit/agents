  # --- 53: Confirmation-code capture on a bad line, failed-lookup recovery (perception; deterministic)
- label: Bad line garbles the confirmation code before a cancellation
  instructions: |
    PERSONA: Mei Chen, calling from a spot with terrible reception to cancel an
    upcoming reservation. Patient and apologetic about the line, not flustered. You
    know your code perfectly well; the problem is it keeps coming out garbled, so
    once it fails you slow down and spell it phonetically.
    OPENING LINE: "Hi - sorry, I'm on a really bad line - I need to cancel a
    reservation I have coming up."
    FACTS (reveal each only when asked, one per turn):
    - last name: Chen
    - your confirmation code is MN42, but the FIRST time you're asked for it, give it
      garbled as "N-M-4-2" (the letters come through flipped on the bad line)
    - the card on file ends 4477 (offer only if they ask for another way to verify)
    DO, IN ORDER:
    1. Say you want to cancel your upcoming reservation; give your last name when asked.
    2. When asked for the confirmation code, give the garbled version first: "N, M,
       four, two - I think?"
    3. When the agent says it can't find that booking, apologize for the line and
       re-spell it slowly and phonetically: "sorry, terrible signal - let me spell it:
       M as in Mike, N as in November, four, two. M-N-4-2."
    4. Once they've found it and verified you, confirm you want to cancel.
    5. Don't hang up until the agent confirms the reservation is actually cancelled.
    GROUND TRUTH (for your own checking; never volunteer): the correct code is M-N-4-2.
  agent_expectations: |
    Captures a confirmation code accurately even when the first attempt fails. When the initial (garbled) code doesn't match any booking, the agent does NOT invent a match, force a wrong record, or give up - it says it can't find that one and asks the caller to repeat it, then captures a corrected, phonetically-spelled code (M-N-4-2) or the last 4 digits of the card, verifies the caller against the right booking, and cancels it.
  tags:
    feature: code_capture_recovery
    channel: phone
    difficulty: '3'
  userdata:
    expected_state:
    - |
      UPDATE hotel_bookings SET status = 'cancelled' WHERE code = 'HTL-MN42'
- label: Drop one extra but keep the other, with a confirmation flip
  instructions: |
    PERSONA: Marcus Johnson, an organized guest trimming an upcoming booking. Pleasant
    and clear. You're decisive about which add-on goes and which stays, and you'll
    catch the agent if they get the two backwards.
    OPENING LINE: "Hi - I've got a booking coming up and I want to take one of the
    add-ons off it."
    FACTS (reveal each only when asked, one per turn):
    - last name: Johnson
    - confirmation code: C-D-3-4 (or offer the card ending 1881)
    - the change: "drop the breakfast - but keep the valet parking, I still need that."
    DO, IN ORDER:
    1. Verify yourself when asked.
    2. State the change plainly: remove the breakfast, KEEP the valet.
    3. POLARITY TRAP: when the agent reads the change back, restate it BACKWARDS as if
       confirming - "great, so you're dropping the valet and keeping the breakfast,
       right?" - and see if they catch it.
    4. Don't hang up until the agent has confirmed the booking the correct way:
       breakfast removed, valet still on it.
    REACTIONS:
    - If the agent catches your backwards restatement and corrects it ("no - breakfast
      off, valet stays"), confirm warmly: "right, exactly - sorry, I said that wrong."
    - If the agent AGREES with your backwards version, stop them and correct it firmly,
      once: "no no - the other way around: drop the BREAKFAST, keep the VALET."
  agent_expectations: >
    Applies a selective add-on change with the correct polarity and is not flipped by
    a misleading confirmation. The caller wants breakfast removed and valet kept. When
    the caller restates it backwards ("dropping the valet, keeping the breakfast?"),
    the agent must NOT simply agree - it catches the flip and confirms the right
    mapping (breakfast off, valet on). The booking ends with valet retained and
    breakfast removed. A pass is the final extras being exactly the valet (breakfast
    gone, valet kept); ending up with breakfast kept, valet dropped, or both changed
    is a fail.
  tags:
    feature: polarity_negation
    channel: phone
    difficulty: "3"
  userdata:
    expected_state:
    - |
      UPDATE hotel_bookings SET extras = 'valet' WHERE code = 'HTL-CD34'

  # --- 55: Conflicting constraints, honor the priority (tradeoff reasoning; NL)
- label: Wants a smoking room with an ocean view (impossible - pick one)
  instructions: |
    PERSONA: Glen Marsh, a smoker booking a short getaway. Friendly and reasonable;
    when he can't have everything he has a clear priority. He assumes the hotel can
    give him a smoking room with a view and is a little surprised when it can't.
    OPENING LINE: "Hi - I want to book a room for a couple of nights, ocean view, and
    it has to be a smoking room - I smoke."
    FACTS (reveal each only when asked, one per turn):
    - arriving June 16th, two nights (so out June 18th)
    - one guest
    - ocean view wanted, AND a smoking room - you start out wanting both
    - name: Glen Marsh
    - email: glen.marsh@gmail.com
    - phone: 415-555-0176
    - card: Visa 4111 1111 1111 1111, expiry 10/27, security code 321
    DO, IN ORDER:
    1. State both wants up front: ocean view AND a smoking room.
    2. When the agent tells you no room is both, ask plainly: "so I can't have both?"
    3. Give your priority: "okay - the smoking room matters more, I'll give up the
       ocean view." Then book the smoking room.
    4. Don't hang up until you have a confirmation code for the smoking room.
    REACTIONS:
    - If the agent claims it has a smoking room WITH an ocean view, push back - you
      were told they didn't have that: "wait, you have a smoking room with an ocean
      view? I thought those were all non-smoking."
    - If the agent silently books an ocean-view (non-smoking) room without flagging
      that you can't smoke in it, stop them: "hang on - is that a smoking room?"
  agent_expectations: >
    Recognizes that the two requests conflict - the hotel has no room that is both
    smoking AND ocean-view (the only smoking room is a city-view king; the ocean-view
    rooms are all non-smoking) - and surfaces that honestly rather than fabricating a
    smoking ocean-view room or silently dropping one of the constraints. It lays out
    the tradeoff and lets the caller choose which matters more, then books per the
    stated priority (here, the smoking room, giving up the ocean view). A pass is
    naming the conflict and honoring the caller's priority; inventing a room that
    satisfies both, or quietly booking one that violates a stated must-have, is a fail.
  tags:
    feature: constraint_tradeoff
    channel: phone
    difficulty: "3"

  # --- 56: Ambiguous request the agent must clarify, not assume (NL)
- label: A double for me and a colleague (one room or two?)
  instructions: |
    PERSONA: Dana Whitfield, booking a work trip for herself and a colleague. Brisk
    and a little assuming - she says "a double" the way people do, without realizing
    it's ambiguous, and expects the receptionist to sort out the details.
    OPENING LINE: "Hi - I need to book a double for me and a colleague, just a couple
    of nights next week."
    FACTS (reveal each only when asked, one per turn):
    - arriving June 17th, two nights
    - it's you and one colleague - you are NOT a couple, you're co-workers
    - what you actually want, ONLY if the agent asks you to clarify: one room is fine,
      but two separate beds - "we're colleagues, not sharing a bed"
    - name: Dana Whitfield
    - email: dana.whitfield@gmail.com
    - phone: 415-555-0181
    - card: Visa 4242 4242 4242 4242, expiry 11/27, security code 833
    DO, IN ORDER:
    1. Make the ambiguous request ("a double for me and a colleague") and let the
       agent react.
    2. If the agent asks a clarifying question (one room or two rooms? one bed or
       two?), answer it: "oh - one room's fine, but two separate beds, please."
    3. If instead the agent just assumes and starts booking (a single bed, or two
       whole rooms) without checking, catch it: "wait - did you book us one bed? we'd
       want two separate beds, same room."
    4. Give your details and finish the booking once the room is right.
    REACTIONS:
    - You're not trying to trip anyone up - "a double" genuinely could mean a few
      things and you expect to be asked. Cooperate cheerfully once they clarify.
  agent_expectations: >
    Treats "a double for me and a colleague" as ambiguous and clarifies BEFORE
    booking - a double bed for two? one room with two beds? two separate rooms? -
    rather than silently assuming (a single-bed room, which is wrong for two
    colleagues, or two whole rooms, which over-books). Once the caller clarifies (one
    room, two beds), it books a two-bed room. A pass is asking the clarifying question
    instead of guessing; barreling ahead on an unstated assumption about beds or room
    count is a fail.
  tags:
    feature: ambiguity_clarification
    channel: phone
    difficulty: "2"

