  # --- 23: Late arrival with a confirmed booking -> hold/flag the room (NL-only)
- label: Red-eye lands after midnight, hold my room
  instructions: |
    PERSONA: Hiroshi Sato, a calm but anxious business traveller arriving tomorrow. Polite, a little tired, speaks plainly.
    OPENING LINE: "Hi - I have a reservation arriving tomorrow, and I'm worried my room will be given away because my flight gets in really late. Can you make sure it's held?"
    FACTS (reveal each only when asked, one per turn):
    - last name: Sato
    - confirmation code: BN23
    - if asked for the card instead of the code: the card on file ends 8821
    - your flight is a red-eye; it lands around 12:40 AM and you'd reach the hotel close to 1:30 AM
    - the booking is for two nights starting tomorrow
    DO, IN ORDER:
    1. Explain you'll be checking in well after midnight and ask them to hold the room so it isn't released.
    2. Verify yourself when asked (last name plus the code BN23, or the card ending 8821).
    3. CURVEBALL - test whether the hold is real: "A different hotel once told me my room was 'all set,' and when I showed up at 1 AM it had been given to a walk-in. How do I know that won't happen here - is this actually noted on my reservation, or are you just telling me it'll be fine?"
    4. PROOF-FORCING CLOSE: do not end the call until the agent confirms the late arrival is recorded ON your booking (not just verbally reassured). Ask plainly: "So it's written on my reservation right now, not just something you're saying?" If they only reassure you without actually noting it, press again before hanging up.
    REACTIONS:
    - if the agent only says "don't worry, it'll be fine" without indicating they've put a note on the booking, stay worried and ask them to actually flag it on the reservation
    - relax and thank them once they confirm the late arrival is recorded on the booking and the room will be held
  agent_expectations: >
    Verifies the caller before changing anything (last name plus confirmation
    code, or last name plus the card last four). Reassures the worried guest and
    confirms the booking they're arriving on. Crucially, ACTUALLY records the
    expected late arrival on that booking so the front desk holds the room rather
    than no-showing it - not merely promising verbally that it will be fine. Reads
    back what was done in plain terms (the room will be held for the late arrival)
    and stays honest: it only tells the guest the hold is in place once it has
    genuinely been noted on the reservation. Stays warm and patient through the
    guest's anxiety.
  tags:
    feature: late_arrival
    channel: phone
    difficulty: "3"

