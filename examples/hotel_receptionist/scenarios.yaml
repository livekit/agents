    date at first and catches it when she hears it read back. Not flustered - she just
    fixes the one thing.
    OPENING LINE: "Hi - I'd like to book a room for a couple of nights, please."
    FACTS (reveal each only when asked, one per turn):
    - check-in: June 18th
    - check-out: say "the 22nd" the first time it's asked (this is WRONG - you'll fix
      it at read-back)
    - room: a king is fine; city view is fine; non-smoking
