- label: Caller can't verify, wants change to upcoming stay
  instructions: |
    PERSONA: Eleanor Smith, a guest with an upcoming reservation, calling to adjust it - friendly, a little scattered, in a hurry between meetings.
    OPENING LINE: "Hi, this is Eleanor Smith - I've got a reservation coming up and I need to change something on it."
    FACTS (reveal each only when asked, one per turn):
    - your full name, given in the opening: Eleanor Smith
    - what you want to change: add a late checkout to your upcoming stay
    - a callback number if offered: 415-555-0188 (say it digit by digit)
    DO, IN ORDER:
    1. Ask to make the change to your existing reservation.
    2. When asked to verify, explain you don't have the confirmation code in front of you - you're not at your computer.
    3. When offered the card-on-file path, read off the card in your wallet: last four "7 7 0 2" - say that's the one you always use.
    4. If asked to try again, you genuinely have nothing else to offer - no code, and that's the only card number you can find.
    5. Don't hang up until you're certain a real person will actually call you back about the change - press once: "so someone's definitely going to call me, not just 'we'll see'?"
    REACTIONS:
    - if the agent asks for the confirmation code again, repeat that you simply don't have it
    - settle down once the agent commits to a manager callback and gives you a reference
    HIDDEN TRUTH:
    - the card you're reading off is a different card in your wallet, not the one on the reservation
  agent_expectations: >
    Identity must be verified before touching anything on an existing reservation.
    The agent attempts verification by the available paths (last name plus
    confirmation code, or last name plus the last four of the card on file) and
    reads details back to give the caller a fair chance. When the caller cannot
    produce details that match the reservation, the agent does NOT make the
    requested change or act on the account, says so plainly, and instead records
    a manager-callback followup so a human can re-verify and help - capturing the
    caller's name and a callback number. It gives the caller a reference and a
    concrete assurance that someone will follow up, rather than a vague "we'll
    see" or a silent dead end. Stays warm and apologetic about the friction.
  tags:
    feature: verification_help
    channel: phone
    difficulty: "3"
  # NL-only: the agent reliably does the right thing (verify -> fail -> don't act ->
  # record a manager callback with the caller's name + number), but the followup KIND
  # is a non-deterministic internal choice - it logs verification_help only after the
  # verify sub-task formally exhausts 3 attempts, and a defensible plain callback when
  # the caller gives up earlier. Both route the caller to a manager, so the behavior is
  # judged via agent_expectations rather than asserting a flaky kind.

  # --- 26: Dropped mid-booking -> callback to finish (deterministic: abandoned_booking)
- label: Dropped mid-booking, needs callback to finish reservation
  instructions: |
    PERSONA: Gwen Harper, a friendly prospective guest in the middle of booking a room for the first time. Slightly rushed, apologetic about the interruption. She has no existing reservation.
    OPENING LINE: "Hi, I'd like to book a room for a couple of nights next month - can you help me get that started?"
    FACTS (reveal each only when asked, one per turn):
    - your name: Gwen Harper
    - your callback number: 415-555-0150
    - the dates you're after: two nights starting July 14th
    - your party: just you and your partner, two adults
    DO, IN ORDER:
    1. Start the booking in earnest - give the dates and party size when asked, act genuinely interested in finishing.
    2. CURVEBALL: partway through (after you've given dates and party but before any card or confirmation), interrupt yourself - "Oh - I'm so sorry, my meeting is starting and I have to run. Can someone call me back so we can finish this? I really do want the room." Do NOT provide a card and do NOT complete the booking on this call.
