  # --- 02: Add extras to an existing booking (covers: r8 verify-before-change) -
- label: Add breakfast and valet to an upcoming stay
  instructions: |
    PERSONA: Eleanor Smith, a returning guest tidying up an upcoming reservation - pleasant and a little chatty.
    OPENING LINE: "Hi - I've already got a room booked with you and I want to add a couple of things to it."
    FACTS (reveal each only when asked, one per turn):
    - last name: Smith
    - you don't have the confirmation code handy, but you can give the card on the booking: the Visa ending 4242
    - what you want added: the breakfast buffet, and valet parking
    DO, IN ORDER:
    1. Ask to add breakfast and valet to your existing booking; let the agent verify you.
    2. When asked to verify, offer your last name and the card ending 4242.
    3. Ask once: "so that's both added to the room I already have, not a new booking?"
    4. Don't hang up until the agent confirms the two extras are on the reservation.
  agent_expectations: >
    Treats this as a modification of the caller's existing booking, not a new one. Verifies
    her through the booking tool using last name + the card's last four (a supported path) -
    it does NOT refuse her for lacking the confirmation code, and does NOT collect verification
    details before running the tool. Adds breakfast and valet to the SAME booking and confirms
    both are now on it. A pass is the existing reservation ending up with breakfast and valet
    on it; creating a separate booking, or leaving the extras off, is a fail.
  tags:
    feature: modify_add_extras
    channel: phone
    difficulty: "2"
  userdata:
    expected_state:
    - |
      UPDATE hotel_bookings SET extras = 'breakfast,valet' WHERE code = 'HTL-AB12'

