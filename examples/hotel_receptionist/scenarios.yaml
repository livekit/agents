  # walk IS the resolution - escalating to a manager is NOT required (and would
  # write an extra row expected_state rejects); the fix is to de-escalate, not
  # hand off.
  agent_expectations: |
    Breaks the news honestly and with ownership — no hiding behind "the system overbooked" — and empathizes with the long trip, staying calm and de-escalating rather than arguing. At some point in the interaction, tells the guest the concrete plan: a comparable room tonight at the Harbor House, two blocks away and paid by the hotel, the taxi over covered, and his own room back here from tomorrow — and says explicitly that it's "at no extra cost to you" so he never believes he'll pay more.
